<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#635BFF">
  <meta name="description" content="InvoicePass — the fastest way to invoice. Pick your trade, send your invoice.">
  <meta property="og:title" content="InvoicePass · Make an invoice">
  <meta property="og:description" content="The fastest way to invoice. Built for the people doing the work.">
  <meta property="og:type" content="website">
  <title>InvoicePass · Make an invoice</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23635BFF'/%3E%3Cpath d='M30 36h40v6H30zm0 14h40v6H30zm0 14h26v6H30z' fill='white'/%3E%3Ccircle cx='74' cy='30' r='6' fill='%23F5BE58'/%3E%3C/svg%3E">

  <style>
    :root {
      --ip-brand-50:  #F4F3FF;
      --ip-brand-100: #EBE9FE;
      --ip-brand-500: #7C5DFA;
      --ip-brand-600: #635BFF;
      --ip-brand-700: #5046E4;
      --ip-ink-50:  #F6F9FC;
      --ip-ink-100: #E3E8EE;
      --ip-ink-200: #C1C9D2;
      --ip-ink-300: #A3ACB9;
      --ip-ink-400: #8898AA;
      --ip-ink-600: #425466;
      --ip-ink-900: #0A2540;
      --ip-amber-100: #FEF3D7;
      --ip-amber-500: #F5BE58;
      --ip-amber-600: #E0A93D;
      --ip-canvas: #F6F9FC;
      --ip-white: #FFFFFF;
      --ip-border: #E3E8EE;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    html { background: var(--ip-canvas); }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--ip-ink-900);
      background: var(--ip-canvas);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      line-height: 1.5;
    }
    button, input { font-family: inherit; }
    button { cursor: pointer; border: none; background: none; color: inherit; }
    button:focus-visible { outline: 3px solid var(--ip-brand-600); outline-offset: 2px; }
    input:focus { outline: none; }

    .app {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--ip-white);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    @media (min-width: 700px) {
      body {
        display: flex; align-items: center; justify-content: center;
        padding: 32px; min-height: 100dvh;
        background: radial-gradient(circle at 30% 20%, #EBE9FE 0%, var(--ip-canvas) 60%);
      }
      .app {
        min-height: 780px; max-height: 92vh; max-width: 420px;
        border-radius: 36px;
        box-shadow: 0 32px 80px -16px rgba(10, 37, 64, 0.18), 0 0 0 1px rgba(10, 37, 64, 0.06);
      }
      .header { padding-top: 24px; }
    }

    .header {
      padding: 16px 24px 0;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; height: 64px;
    }
    .wordmark {
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.3px; color: var(--ip-ink-900);
      display: flex; align-items: center; gap: 1px;
    }
    .wordmark-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ip-amber-500);
      margin-left: 3px; margin-bottom: 11px;
    }
    .back-btn {
      width: 44px; height: 44px; border-radius: 14px;
      background: var(--ip-ink-50);
      display: flex; align-items: center; justify-content: center;
      color: var(--ip-ink-900); font-size: 22px;
      transition: all 150ms var(--ease-out);
    }
    .back-btn:hover { background: var(--ip-ink-100); }
    .back-btn:active { transform: scale(0.94); }
    .stepper { display: flex; gap: 7px; align-items: center; }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ip-ink-100);
      transition: all 280ms var(--ease-out);
    }
    .step-dot.completed { background: var(--ip-brand-600); }
    .step-dot.active {
      background: var(--ip-brand-600); width: 28px; border-radius: 4px;
    }
    .spacer { width: 44px; }

    .main {
      flex: 1; overflow-y: auto;
      padding: 28px 24px 16px;
      -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
    }
    .main::-webkit-scrollbar { width: 0; }

    .step { animation: stepIn 360ms var(--ease-out); }
    @keyframes stepIn {
      from { opacity: 0; transform: translateX(24px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .step.back { animation: stepInBack 360ms var(--ease-out); }
    @keyframes stepInBack {
      from { opacity: 0; transform: translateX(-24px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .eyebrow {
      font-size: 12px; color: var(--ip-ink-400);
      letter-spacing: 0.6px; font-weight: 600;
      margin-bottom: 12px; text-transform: uppercase;
    }
    .headline {
      font-size: 32px; font-weight: 700;
      color: var(--ip-ink-900);
      letter-spacing: -0.6px; line-height: 1.1;
      margin-bottom: 28px;
    }
    .headline.sm { font-size: 26px; margin-bottom: 24px; }

    /* HUB grid */
    .category-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .category-card {
      background: var(--ip-white);
      border: 1.5px solid var(--ip-border);
      border-radius: 16px; padding: 18px 16px;
      display: flex; flex-direction: column; gap: 12px;
      align-items: flex-start; text-align: left;
      transition: all 200ms var(--ease-out);
      min-height: 130px;
    }
    .category-card:hover {
      border-color: var(--ip-brand-600); transform: translateY(-2px);
      box-shadow: 0 12px 24px -8px rgba(99, 91, 255, 0.16);
    }
    .category-card:active { transform: scale(0.98); }
    .category-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--ip-brand-50); color: var(--ip-brand-600);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .category-title { font-size: 16px; font-weight: 600; color: var(--ip-ink-900); line-height: 1.2; }
    .category-sub { font-size: 12px; color: var(--ip-ink-400); line-height: 1.4; margin-top: 2px; }

    .type-card {
      width: 100%; background: var(--ip-white);
      border: 1.5px solid var(--ip-border);
      border-radius: 18px; padding: 20px;
      display: flex; gap: 16px; align-items: center;
      text-align: left; transition: all 200ms var(--ease-out);
    }
    .type-card + .type-card { margin-top: 12px; }
    .type-card:hover {
      border-color: var(--ip-brand-600); transform: translateY(-2px);
      box-shadow: 0 12px 28px -8px rgba(99, 91, 255, 0.18);
    }
    .type-card:active { transform: scale(0.99); }
    .type-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--ip-brand-50);
      display: flex; align-items: center; justify-content: center;
      color: var(--ip-brand-600); flex-shrink: 0;
    }
    .type-title { font-size: 18px; font-weight: 600; color: var(--ip-ink-900); margin-bottom: 2px; }
    .type-sub { font-size: 14px; color: var(--ip-ink-400); }
    .type-arrow { margin-left: auto; color: var(--ip-ink-300); font-size: 22px; flex-shrink: 0; }

    .search-input, .field-input {
      width: 100%; background: var(--ip-white);
      border: 1.5px solid var(--ip-border);
      border-radius: 14px; height: 60px;
      padding: 0 20px; font-size: 17px;
      color: var(--ip-ink-900);
      transition: all 200ms var(--ease-out);
    }
    .search-input::placeholder, .field-input::placeholder { color: var(--ip-ink-300); }
    .search-input:focus, .field-input:focus {
      border-color: var(--ip-brand-600);
      box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.14);
    }

    .section-label {
      font-size: 12px; color: var(--ip-ink-400);
      letter-spacing: 0.6px; font-weight: 600;
      margin: 24px 0 12px; text-transform: uppercase;
    }
    .section-label:first-child { margin-top: 0; }

    .contact-card {
      width: 100%; background: var(--ip-white);
      border: 1.5px solid var(--ip-border);
      border-radius: 14px; padding: 14px 16px;
      display: flex; gap: 14px; align-items: center;
      text-align: left; transition: all 200ms var(--ease-out);
    }
    .contact-card + .contact-card { margin-top: 10px; }
    .contact-card:hover { border-color: var(--ip-brand-600); background: var(--ip-brand-50); }
    .contact-card:active { transform: scale(0.99); }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--ip-brand-50); color: var(--ip-brand-700);
      font-weight: 600; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .avatar.plus {
      background: var(--ip-ink-50); color: var(--ip-ink-400);
      font-size: 22px; font-weight: 400;
    }
    .contact-name { font-size: 16px; font-weight: 600; color: var(--ip-ink-900); }
    .contact-email { font-size: 13px; color: var(--ip-ink-400); margin-top: 2px; }

    .field { margin-bottom: 24px; }
    .field-label { font-size: 13px; font-weight: 600; color: var(--ip-ink-600); margin-bottom: 10px; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .chip {
      background: var(--ip-white);
      border: 1.5px solid var(--ip-border);
      border-radius: 999px; padding: 11px 18px;
      font-size: 14px; font-weight: 500; color: var(--ip-ink-900);
      transition: all 150ms var(--ease-out);
    }
    .chip:hover { border-color: var(--ip-brand-600); color: var(--ip-brand-600); background: var(--ip-brand-50); }
    .chip:active { transform: scale(0.95); }
    .chip.custom { border-style: dashed; color: var(--ip-ink-400); }

    .line-item {
      background: var(--ip-white);
      border: 1.5px solid var(--ip-border);
      border-radius: 14px; padding: 16px 18px;
      margin-bottom: 10px;
      animation: stepIn 280ms var(--ease-out);
    }
    .line-item-row { display: flex; justify-content: space-between; align-items: baseline; }
    .line-item-row + .line-item-row { margin-top: 6px; }
    .line-item-desc { font-size: 16px; font-weight: 600; color: var(--ip-ink-900); }
    .line-item-remove { color: var(--ip-ink-300); font-size: 22px; padding: 0 4px; transition: color 150ms; }
    .line-item-remove:hover { color: var(--ip-ink-900); }
    .line-item-meta { font-size: 13px; color: var(--ip-ink-400); }
    .line-item-amount { font-size: 17px; font-weight: 600; color: var(--ip-ink-900); }

    .empty {
      text-align: center; padding: 36px 24px;
      color: var(--ip-ink-300); font-size: 14px;
      border: 1.5px dashed var(--ip-border);
      border-radius: 14px; margin-bottom: 12px;
    }

    .review-block { background: var(--ip-canvas); border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; }
    .review-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .review-label { font-size: 11px; color: var(--ip-ink-400); letter-spacing: 0.6px; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; }
    .review-value { font-size: 16px; font-weight: 500; color: var(--ip-ink-900); }
    .review-items-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; color: var(--ip-ink-900); }
    .review-items-row + .review-items-row { border-top: 1px solid var(--ip-ink-100); }
    .review-items-row .amt { font-weight: 600; }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 4px; margin-top: 8px;
      border-top: 1px solid var(--ip-border);
    }
    .toggle-label { font-size: 14px; color: var(--ip-ink-900); font-weight: 500; }
    .toggle-sub { font-size: 12px; color: var(--ip-ink-400); margin-top: 2px; }
    .toggle-switch {
      width: 48px; height: 28px; border-radius: 999px;
      background: var(--ip-ink-100); position: relative;
      transition: background 200ms var(--ease-out);
      flex-shrink: 0;
    }
    .toggle-switch.on { background: var(--ip-brand-600); }
    .toggle-switch::after {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--ip-white);
      transition: transform 200ms var(--ease-out);
      box-shadow: 0 1px 2px rgba(10, 37, 64, 0.2);
    }
    .toggle-switch.on::after { transform: translateX(20px); }

    .totals { padding: 20px 4px 0; border-top: 1px solid var(--ip-border); margin-top: 8px; }
    .totals-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
    .totals-row.grand { border-top: 1px solid var(--ip-border); margin-top: 12px; padding-top: 18px; font-size: 22px; font-weight: 700; }
    .totals-label { color: var(--ip-ink-600); }
    .totals-value { color: var(--ip-ink-900); font-weight: 600; }

    .footer {
      padding: 16px 24px 28px;
      border-top: 1px solid var(--ip-border);
      background: var(--ip-white); flex-shrink: 0;
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }
    .footer.hidden { display: none; }
    .footer-subtotal { display: flex; justify-content: space-between; font-size: 14px; color: var(--ip-ink-600); margin-bottom: 14px; }
    .footer-subtotal strong { font-weight: 600; color: var(--ip-ink-900); }

    .cta {
      width: 100%; background: var(--ip-brand-600);
      color: var(--ip-white); border-radius: 14px;
      height: 60px; font-size: 17px; font-weight: 600;
      transition: all 180ms var(--ease-out);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .cta:hover { background: var(--ip-brand-700); }
    .cta:active { transform: scale(0.985); }
    .cta:disabled { background: var(--ip-ink-100); color: var(--ip-ink-400); cursor: not-allowed; }
    .cta.send { background: var(--ip-amber-500); color: var(--ip-ink-900); }
    .cta.send:hover { background: var(--ip-amber-600); }

    .modal-bg {
      position: absolute; inset: 0;
      background: rgba(10, 37, 64, 0.5);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100;
      animation: fadeIn 200ms var(--ease-out);
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--ip-white);
      border-radius: 24px 24px 0 0;
      width: 100%; padding: 24px 24px 32px;
      animation: slideUp 320ms var(--ease-out);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.3px; }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-secondary {
      flex: 1; background: var(--ip-ink-50); color: var(--ip-ink-900);
      border-radius: 14px; height: 56px; font-size: 16px; font-weight: 600;
    }
    .btn-secondary:hover { background: var(--ip-ink-100); }
    .btn-primary {
      flex: 1; background: var(--ip-brand-600); color: var(--ip-white);
      border-radius: 14px; height: 56px; font-size: 16px; font-weight: 600;
    }
    .btn-primary:hover { background: var(--ip-brand-700); }
    .btn-primary:disabled { background: var(--ip-ink-100); color: var(--ip-ink-400); cursor: not-allowed; }

    .success {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px; text-align: center;
    }
    .success-icon {
      width: 88px; height: 88px; border-radius: 50%;
      background: var(--ip-amber-100); color: var(--ip-amber-600);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      animation: pop 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    .success-title { font-size: 30px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    .success-sub { font-size: 16px; color: var(--ip-ink-600); margin-bottom: 36px; line-height: 1.5; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

    .send-status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 12px;
      font-size: 13px; font-weight: 500;
      margin-top: 10px; min-height: 40px;
      transition: all 200ms var(--ease-out);
    }
    .send-status.ok { background: #ECFDF5; color: #047857; }
    .send-status.err { background: #FEF2F2; color: #B91C1C; }
    .send-status.neutral { background: var(--ip-ink-50); color: var(--ip-ink-400); }
    .send-status.email { background: var(--ip-brand-50); color: var(--ip-brand-700); }
    .send-status-icon {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 12px; font-weight: 700;
    }
    .turnstile-host { margin-top: 12px; display: flex; justify-content: center; min-height: 65px; }
    .send-error {
      background: #FEF2F2; color: #B91C1C;
      padding: 10px 14px; border-radius: 12px;
      font-size: 13px; margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1 class="sr-only">InvoicePass — Make an invoice</h1>

  <div class="app" id="app">
    <header class="header" id="header">
      <button class="back-btn" id="backBtn" aria-label="Back">←</button>
      <div class="stepper" id="stepper" aria-label="Progress"></div>
      <div class="spacer"></div>
    </header>
    <main class="main" id="main"></main>
    <footer class="footer hidden" id="footer"></footer>
    <div id="modalRoot"></div>
  </div>

  <script>
    const ICONS = {
      construction: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22h20"/><path d="M4 22V10l8-6 8 6v12"/><path d="M9 22V14h6v8"/></svg>',
      electrical: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
      plumbing: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h6v9H3z"/><path d="M9 6h12v6H9z"/><path d="M9 12V6"/></svg>',
      hvac: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 9V3M12 21v-6M9 12H3M21 12h-6M16 8l4-4M4 20l4-4M16 16l4 4M4 4l4 4"/></svg>',
      painting: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="6" rx="1"/><path d="M7 9v3a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9"/><path d="M12 14v4"/><rect x="10" y="18" width="4" height="4" rx="1"/></svg>',
      cleaning: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l4-4 14 14-4 4z"/><path d="M14 4l5 5"/><path d="M7 13l-3 3v4h4l3-3"/></svg>',
      landscaping: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M12 7c0-3 3-5 6-5-1 4-3 7-6 7"/><path d="M12 12c0-3-3-5-6-5 1 4 3 7 6 7"/><path d="M12 17c0-3 3-5 6-5-1 4-3 7-6 7"/></svg>',

    function escapeHtml(s) {

    // ---- Hours helpers (HH:MM <-> minutes) ----
    function minutesFromHHMM(hhmm) {
      if (!hhmm || !/^\d{1,2}:\d{2}$/.test(hhmm)) return 0;
      const [h, m] = hhmm.split(':').map(Number);
      return h * 60 + m;
    }
    function computeEntryMinutes(start, end, breakMin) {
      const s = minutesFromHHMM(start);
      let e = minutesFromHHMM(end);
      if (e < s) e += 24 * 60; // overnight (e.g. 22:00 -> 02:00)
      const total = e - s - (Number(breakMin) || 0);
      return Math.max(0, total);
    }
    function formatHM(totalMinutes) {
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      if (h === 0) return m + 'm';
      if (m === 0) return h + 'h';
      return h + 'h ' + m + 'm';
    }
    function decimalHours(totalMinutes) {
      return Math.round((totalMinutes / 60) * 100) / 100;
    }

    function calculateTotals() {
      const rate = state.applyHst ? 0.13 : 0;
      if (state.type === 'timesheet') {
        const totalMin = state.timeEntries.reduce((s, e) => s + e.totalMinutes, 0);
        const subtotal = Math.round((totalMin / 60) * state.hourlyRate * 100) / 100;
        const hst = Math.round(subtotal * rate * 100) / 100;
        return { subtotal, hst, total: Math.round((subtotal + hst) * 100) / 100, totalMinutes: totalMin };
      }
      const subtotal = state.lineItems.reduce((s, i) => s + i.qty * i.price, 0);
      const hst = Math.round(subtotal * rate * 100) / 100;
      return { subtotal, hst, total: Math.round((subtotal + hst) * 100) / 100, totalMinutes: 0 };
    }

    // Email if it has @ with a TLD. Handle if alphanumeric/dash/underscore.
    function classifyRecipient(value) {
      const v = (value || '').trim();
      if (!v) return 'unknown';
      if (/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v)) return 'email';
      if (/^[a-z0-9_-]{1,40}$/.test(v.toLowerCase())) return 'handle';
      return 'unknown';
    }

    let lookupDebounceTimer = null;
    let lookupAbortCtrl = null;

    function onRecipientChange(value) {
      state.send.recipient = value;
      state.send.kind = classifyRecipient(value);
      state.send.lookup = { state: 'idle' };
      clearTimeout(lookupDebounceTimer);
      if (lookupAbortCtrl) { lookupAbortCtrl.abort(); lookupAbortCtrl = null; }
      if (state.send.kind === 'handle') {
        state.send.lookup = { state: 'pending' };
        lookupDebounceTimer = setTimeout(() => triggerHandleLookup(value), 300);
      }
      updateSendStatus();
      updateSendButton();
    }

    async function triggerHandleLookup(value) {
      const handle = (value || '').trim().toLowerCase();
      if (!/^[a-z0-9_-]{1,40}$/.test(handle)) return;
      lookupAbortCtrl = new AbortController();
      try {
        const res = await fetch(
          PORTAL_BASE_URL + '/api/public-lookup?handle=' + encodeURIComponent(handle),
          { signal: lookupAbortCtrl.signal }
        );
        if (!res.ok) throw new Error('lookup ' + res.status);
        const data = await res.json();
        if (data.exists) {
          state.send.lookup = { state: 'ok', display_name: data.display_name || handle };
        } else {
          state.send.lookup = { state: 'notfound' };
        }
      } catch (err) {
        if (err.name === 'AbortError') return;
        console.warn('[send] lookup failed', err);
        state.send.lookup = { state: 'error' };
      }
      updateSendStatus();
      updateSendButton();
    }

          cls = 'send-status err';
          html = '<span class="send-status-icon" style="background:#EF4444; color:white;">✗</span> Handle <strong>' + escapeHtml(s.recipient) + '</strong> not found';
        } else if (s.lookup.state === 'error') {
          cls = 'send-status err';
          html = '<span class="send-status-icon" style="background:#EF4444; color:white;">!</span> Could not reach portal. Try again.';
        }

    async function submitSend() {
      if (!canSubmitSend()) return;
      state.send.submitting = true;
      updateSendButton();
      const errBox = document.getElementById('sendError');
      if (errBox) errBox.textContent = '';

      try {
        // Generate the PDF (same code path as Download PDF)
        const payload = buildInvoicePayload();
        const pdfBytes = await generateInvoicePdf(payload);
        const pdfBase64 = bytesToBase64(pdfBytes);

        if (state.send.kind === 'handle') {
          await submitToPortal(payload, pdfBase64);
        } else {
          await submitByEmail(payload, pdfBase64);
        }
        // Success — close modal, advance to Sent view
        state.modal = null;
        state.view = 'sent';
        render();
      } catch (err) {
        console.error('[send] failed', err);
        state.send.submitting = false;
        if (errBox) errBox.textContent = err.message || 'Failed to send. Try again.';
        // Force Turnstile widget to issue a new token (each token is single-use)
        if (window.turnstile && state.send.turnstileWidget != null) {
          window.turnstile.reset(state.send.turnstileWidget);
          state.send.turnstileToken = '';
        }
        updateSendButton();
      }
    }

    async function submitToPortal(payload, pdfBase64) {
      const res = await fetch(PORTAL_BASE_URL + '/api/public-submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          handle: state.send.recipient.trim().toLowerCase(),
          pdf_base64: pdfBase64,
          turnstile_token: state.send.turnstileToken,
          sender_email: payload.issuer_email,
          sender_name: payload.issuer_name,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(humanizePortalError(data.error || ('HTTP ' + res.status)));
      }
      state.send.result = {
        ok: true,
        kind: 'handle',
        display_name: state.send.lookup.display_name,
        invoice_id: data.invoice_id,
        status: data.status,
      };
    }

    async function submitByEmail(payload, pdfBase64) {
      const res = await fetch(SEND_EMAIL_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          to_email: state.send.recipient.trim(),
          pdf_base64: pdfBase64,
          turnstile_token: state.send.turnstileToken,
          invoice_number: payload.invoice_number,
          total: payload.total,
          sender_email: payload.issuer_email,
          sender_name: payload.issuer_name,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error || ('Email send failed: HTTP ' + res.status));
      }
      state.send.result = {
        ok: true,
        kind: 'email',
        address: state.send.recipient.trim(),
      };
    }

    function humanizePortalError(code) {
      const map = {
        invalid_payload:   'The invoice data was rejected by the portal.',
        handle_not_found:  'That InvoicePass user no longer exists.',
        quota_exceeded:    'The recipient has reached their monthly quota.',
        invalid_pdf:       'The generated PDF was rejected.',
        turnstile_failed:  'Captcha verification failed. Please try again.',
        rate_limited:      'Too many submissions from this device. Wait a bit and retry.',
      };
      return map[code] || code;
    }

    // Reuse the chunked base64 encoder pattern from timekeeper's invoiceXmp.ts
    function bytesToBase64(bytes) {
      let binary = '';
      const CHUNK = 0x8000;
      for (let i = 0; i < bytes.length; i += CHUNK) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + CHUNK, bytes.length)));
      }
      return btoa(binary);
    }

    function resetFlow() {
      state.view = 'hub';
      state.step = 1;
      state.direction = 'forward';
      state.category = null;
      state.type = null;
      state.contact = null;
      state.jobSite = '';
      state.serviceDate = '';
      state.dueDate = '';
      state.lineItems = [];
      state.hourlyRate = 0;

    // ========================================================================
    // PDF + XMP generation (Day 1)
    // ========================================================================

    function xmlEscape(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'
      }[c]));
    }

    // Format aligned with onsite-timekeeper/src/lib/invoiceXmp.ts:
    // up to 2 decimals, trailing zeros trimmed. "0" instead of "0.00".
    function formatHoursForXmp(n) {
      if (!Number.isFinite(n)) return '0';
      const s = n.toFixed(2);
      return s.replace(/\.?0+$/, '') || '0';
    }

    function buildXmpPacket(data) {
      // XMP packet matching the contract at portal/src/lib/email/extract-xmp.ts
      // Namespace: http://schemas.onsiteclub.ca/invoice/1.0/
      const fields = [
        ['invoice_number',    data.invoice_number],
        ['amount',            data.amount.toFixed(2)],
        ['hst',               data.hst.toFixed(2)],
        ['currency',          data.currency],
        ['gc_name',           data.gc_name],
        ['site_address',      data.site_address],
        ['issuer_email',      data.issuer_email],
        ['issuer_name',       data.issuer_name],
        ['company_name',      data.company_name],
        ['company_hst_number',data.company_hst_number],
        ['hours_logged',      formatHoursForXmp(data.hours_logged)],
        ['issued_at',         data.issued_at],
        ['timekeeper_version',data.timekeeper_version],
      ];
      const body = fields.map(([k, v]) =>
        `      <onsite:${k}>${xmlEscape(v)}</onsite:${k}>`
      ).join('\n');
      return `<?xpacket begin="﻿" id="W5M0MpCehiHzreSzNTczkc9d"?>
<x:xmpmeta xmlns:x="adobe:ns:meta/" x:xmptk="${MAKE_VERSION}">
  <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">
    <rdf:Description rdf:about=""
      xmlns:onsite="${XMP_NAMESPACE}">
${body}
    </rdf:Description>
  </rdf:RDF>
</x:xmpmeta>
<?xpacket end="w"?>`;
    }

    function buildInvoicePayload() {
      const t = calculateTotals();
      const isHourly = state.type === 'timesheet';
      // Full ISO 8601 UTC timestamp, aligned with timekeeper format.
      const issuedAt = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');
      const cat = categoryById(state.category);

      const hoursLogged = isHourly ? decimalHours(t.totalMinutes) : 0;

      // Sorted time entries with computed amount per day (hourly rate × hours)
      const timeRows = isHourly
        ? [...state.timeEntries]
            .sort((a, b) => a.date.localeCompare(b.date))
            .map(e => ({
              date: e.date,
              start: e.start,
              end: e.end,
              breakMinutes: e.breakMinutes,
              totalMinutes: e.totalMinutes,
              hoursLabel: formatHM(e.totalMinutes),
              amount: Math.round((e.totalMinutes / 60) * state.hourlyRate * 100) / 100,
            }))
        : [];

      const periodStart = isHourly && timeRows.length ? timeRows[0].date : '';
      const periodEnd = isHourly && timeRows.length ? timeRows[timeRows.length - 1].date : '';

      return {
        invoice_number: 'INV-0001', // Day 2 will make this incremental
        amount: t.subtotal,
        hst: t.hst,
        total: t.total,
        currency: 'CAD',
        gc_name: state.contact || '',
        gc_email: state.contactExtras.email || '',
        gc_phone: state.contactExtras.phone || '',
        gc_address: state.contactExtras.address || '',
        gc_business_number: state.contactExtras.businessNumber || '',
        site_address: state.jobSite || '',
        issuer_email: PROFILE.issuer_email,
        issuer_name: PROFILE.issuer_name,
        company_name: PROFILE.company_name,
        company_hst_number: PROFILE.company_hst_number || '',
        hours_logged: hoursLogged, // decimal number, e.g. 38.25
        issued_at: issuedAt,       // ISO 8601 UTC, e.g. "2026-05-11T14:23:00Z"
        service_date: !isHourly ? (state.serviceDate || '') : '',
        due_at: state.dueDate || '',
        timekeeper_version: MAKE_VERSION,
        category_title: cat ? cat.title : '',
        type: state.type || '',
        // Piecework rows (empty when timesheet)
        line_items: !isHourly
          ? state.lineItems.map(i => ({
              description: i.description,
              qty: i.qty,
              price: i.price,
              unit: i.unit,
              amount: i.qty * i.price,
            }))
          : [],
        // Timesheet rows (empty when piecework)
        time_rows: timeRows,
        hourly_rate: isHourly ? state.hourlyRate : 0,
        period_start: periodStart,
        period_end: periodEnd,
      };
    }

    async function generateInvoicePdf(payload) {
      const { PDFDocument, StandardFonts, rgb, PDFName, PDFHexString } = PDFLib;
      const pdf = await PDFDocument.create();
      const page = pdf.addPage([612, 792]); // US Letter
      const helv = await pdf.embedFont(StandardFonts.Helvetica);
      const helvBold = await pdf.embedFont(StandardFonts.HelveticaBold);

      const ink = rgb(0.039, 0.145, 0.251);
      const ink600 = rgb(0.259, 0.329, 0.4);
      const ink400 = rgb(0.533, 0.596, 0.667);
      const border = rgb(0.89, 0.91, 0.93);
      const brand = rgb(0.388, 0.357, 1.0);

      const fmt = n => 'CAD ' + Number(n).toLocaleString('en-CA', {
        minimumFractionDigits: 2, maximumFractionDigits: 2,
      });

      let y = 750;
      page.drawText('InvoicePass', { x: 48, y, size: 22, font: helvBold, color: ink });
      page.drawText(payload.invoice_number, {
        x: 612 - 48 - helvBold.widthOfTextAtSize(payload.invoice_number, 22), y,
        size: 22, font: helvBold, color: ink,
      });
      y -= 8;
      page.drawText(payload.category_title + (payload.type ? ' · ' + payload.type : ''), {
        x: 48, y: y - 14, size: 10, font: helv, color: ink400,
      });

      y -= 50;
      const blockTop = y;
      page.drawText('FROM', { x: 48, y, size: 9, font: helvBold, color: ink400 });
      page.drawText('BILL TO', { x: 312, y, size: 9, font: helvBold, color: ink400 });

      // FROM block (left column)
      let yLeft = blockTop - 16;
      page.drawText(payload.company_name || payload.issuer_name, { x: 48, y: yLeft, size: 12, font: helvBold, color: ink });
      yLeft -= 14;
      page.drawText(payload.issuer_name, { x: 48, y: yLeft, size: 10, font: helv, color: ink600 });
      yLeft -= 12;
      page.drawText(payload.issuer_email, { x: 48, y: yLeft, size: 10, font: helv, color: ink600 });
      if (payload.company_hst_number) {
        yLeft -= 12;
        page.drawText('HST# ' + payload.company_hst_number, { x: 48, y: yLeft, size: 10, font: helv, color: ink600 });
      }

      // BILL TO block (right column) — name plus any optional extras
      let yRight = blockTop - 16;
      page.drawText(payload.gc_name, { x: 312, y: yRight, size: 12, font: helvBold, color: ink });
      if (payload.gc_address) {
        yRight -= 14;
        page.drawText(payload.gc_address, { x: 312, y: yRight, size: 10, font: helv, color: ink600 });
      }
      if (payload.gc_email) {
        yRight -= 12;
        page.drawText(payload.gc_email, { x: 312, y: yRight, size: 10, font: helv, color: ink600 });
      }
      if (payload.gc_phone) {
        yRight -= 12;
        page.drawText(payload.gc_phone, { x: 312, y: yRight, size: 10, font: helv, color: ink600 });
      }
      if (payload.gc_business_number) {
        yRight -= 12;
        page.drawText('Business# ' + payload.gc_business_number, { x: 312, y: yRight, size: 10, font: helv, color: ink600 });
      }

      y = Math.min(yLeft, yRight);

      y -= 36;
      const showPeriod = payload.type === 'timesheet' && payload.period_start;
      // Middle column: SERVICE DATE for piecework, ISSUED for timesheet
      const middleLabel = showPeriod ? 'ISSUED' : 'SERVICE DATE';
      const middleValue = showPeriod
        ? payload.issued_at.slice(0, 10)
        : (payload.service_date || payload.issued_at.slice(0, 10));
      page.drawText(showPeriod ? 'PERIOD' : 'LOCATION', { x: 48, y, size: 9, font: helvBold, color: ink400 });
      page.drawText(middleLabel, { x: 312, y, size: 9, font: helvBold, color: ink400 });
      page.drawText('DUE', { x: 462, y, size: 9, font: helvBold, color: ink400 });
      y -= 16;
      const leftValue = showPeriod
        ? (payload.period_start === payload.period_end
            ? payload.period_start
            : payload.period_start + ' → ' + payload.period_end)
        : (payload.site_address || '—');
      page.drawText(leftValue, { x: 48, y, size: 11, font: helv, color: ink });
      page.drawText(middleValue, { x: 312, y, size: 11, font: helv, color: ink });
      page.drawText(payload.due_at || '—', { x: 462, y, size: 11, font: helv, color: ink });

      y -= 36;
      page.drawLine({ start: { x: 48, y }, end: { x: 564, y }, thickness: 1, color: border });
      y -= 16;

      const isHourly = payload.type === 'timesheet';
      if (isHourly) {
        // Header: Date | Start | End | Break | Hours | Amount
        page.drawText('DATE', { x: 48, y, size: 9, font: helvBold, color: ink400 });
        page.drawText('START', { x: 200, y, size: 9, font: helvBold, color: ink400 });
        page.drawText('END', { x: 260, y, size: 9, font: helvBold, color: ink400 });
        page.drawText('BREAK', { x: 320, y, size: 9, font: helvBold, color: ink400 });
        page.drawText('HOURS', { x: 400, y, size: 9, font: helvBold, color: ink400 });
        page.drawText('AMOUNT', {
          x: 564 - helvBold.widthOfTextAtSize('AMOUNT', 9), y,
          size: 9, font: helvBold, color: ink400,
        });
        y -= 8;
        page.drawLine({ start: { x: 48, y }, end: { x: 564, y }, thickness: 1, color: border });

        for (const row of payload.time_rows) {
          y -= 22;
          page.drawText(row.date, { x: 48, y, size: 11, font: helv, color: ink });
          page.drawText(row.start, { x: 200, y, size: 10, font: helv, color: ink600 });
          page.drawText(row.end, { x: 260, y, size: 10, font: helv, color: ink600 });
          page.drawText(row.breakMinutes ? row.breakMinutes + 'm' : '—', { x: 320, y, size: 10, font: helv, color: ink600 });
          page.drawText(row.hoursLabel, { x: 400, y, size: 10, font: helvBold, color: ink });
          const amt = fmt(row.amount);
          page.drawText(amt, {
            x: 564 - helv.widthOfTextAtSize(amt, 11), y,
            size: 11, font: helvBold, color: ink,
          });
        }

        // Rate summary line
        y -= 22;
        const rateLine = `${payload.time_rows.length} day${payload.time_rows.length !== 1 ? 's' : ''} × ${fmt(payload.hourly_rate)}/hr`;
        page.drawText(rateLine, { x: 48, y, size: 10, font: helv, color: ink400 });
      } else {
        page.drawText('DESCRIPTION', { x: 48, y, size: 9, font: helvBold, color: ink400 });
        page.drawText('QTY × PRICE', { x: 360, y, size: 9, font: helvBold, color: ink400 });
        page.drawText('AMOUNT', {
          x: 564 - helvBold.widthOfTextAtSize('AMOUNT', 9), y,
          size: 9, font: helvBold, color: ink400,
        });
        y -= 8;
        page.drawLine({ start: { x: 48, y }, end: { x: 564, y }, thickness: 1, color: border });

        for (const item of payload.line_items) {
          y -= 22;
          page.drawText(item.description, { x: 48, y, size: 11, font: helv, color: ink });
          const meta = `${item.qty} ${item.unit} × ${fmt(item.price)}`;
          page.drawText(meta, { x: 360, y, size: 10, font: helv, color: ink600 });
          const amt = fmt(item.amount);
          page.drawText(amt, {
            x: 564 - helv.widthOfTextAtSize(amt, 11), y,
            size: 11, font: helvBold, color: ink,
          });
        }
      }

      y -= 24;
      page.drawLine({ start: { x: 48, y }, end: { x: 564, y }, thickness: 1, color: border });

      const rightCol = 564;
      const labelCol = 400;
      y -= 20;
      page.drawText('Subtotal', { x: labelCol, y, size: 11, font: helv, color: ink600 });
      const sub = fmt(payload.amount);
      page.drawText(sub, { x: rightCol - helv.widthOfTextAtSize(sub, 11), y, size: 11, font: helvBold, color: ink });
      if (payload.hst > 0) {
        y -= 18;
        page.drawText('HST (13%)', { x: labelCol, y, size: 11, font: helv, color: ink600 });
        const hst = fmt(payload.hst);
        page.drawText(hst, { x: rightCol - helv.widthOfTextAtSize(hst, 11), y, size: 11, font: helvBold, color: ink });
      }
      y -= 24;
      page.drawLine({ start: { x: labelCol, y: y + 14 }, end: { x: rightCol, y: y + 14 }, thickness: 1, color: border });
      page.drawText('Total', { x: labelCol, y, size: 16, font: helvBold, color: ink });
      const tot = fmt(payload.total);
      page.drawText(tot, { x: rightCol - helvBold.widthOfTextAtSize(tot, 16), y, size: 16, font: helvBold, color: brand });

      page.drawText('Generated with make.invoicepass.app', {
        x: 48, y: 36, size: 9, font: helv, color: ink400,
      });

      // ----- Embed XMP metadata as uncompressed Metadata stream -----
      // Portal reads PDF bytes as latin1 and regex-extracts onsite:* fields.
      // pdf-lib's context.stream() creates a raw stream without Filter, and
      // useObjectStreams: false at save time keeps the structure plain.
      const xmpString = buildXmpPacket(payload);
      const xmpBytes = new TextEncoder().encode(xmpString); // UTF-8
      const metadataStream = pdf.context.stream(xmpBytes, {
        Type: 'Metadata',
        Subtype: 'XML',
      });
      const ref = pdf.context.register(metadataStream);
      pdf.catalog.set(PDFName.of('Metadata'), ref);

      const bytes = await pdf.save({ useObjectStreams: false });
      return bytes;
    }

    // Port of portal/src/lib/email/extract-xmp.ts for local validation.
    // Runs in browser against generated bytes to confirm contract is satisfied.
    function validateXmpExtraction(pdfBytes) {
      // Read bytes as latin1 (same as portal: pdfBuffer.toString('latin1'))
      let pdfString = '';
      for (let i = 0; i < pdfBytes.length; i++) {
        pdfString += String.fromCharCode(pdfBytes[i]);
      }
      const xmpMatch = pdfString.match(/<x:xmpmeta[^>]*>([\s\S]*?)<\/x:xmpmeta>/);
      if (!xmpMatch) return { ok: false, reason: 'no_xmp_packet' };
      const xmpContent = xmpMatch[1];
      if (!xmpContent.includes(XMP_NAMESPACE)) return { ok: false, reason: 'wrong_namespace' };

      const UTF8_FIELDS = new Set(['issuer_name', 'company_name', 'site_address', 'gc_name']);
      const extractField = (name) => {
        const re = new RegExp(`<onsite:${name}[^>]*>([\\s\\S]*?)<\\/onsite:${name}>`, 'i');
        const m = xmpContent.match(re);
        if (!m) return '';
        const decoded = m[1]
          .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
          .replace(/&quot;/g, '"').replace(/&apos;/g, "'").trim();
        if (UTF8_FIELDS.has(name)) {
          // Re-decode latin1 bytes as UTF-8 (the portal trick)
          const latin1Bytes = new Uint8Array(decoded.length);
          for (let i = 0; i < decoded.length; i++) latin1Bytes[i] = decoded.charCodeAt(i) & 0xff;
          return new TextDecoder('utf-8').decode(latin1Bytes);
        }
        return decoded;
      };

      const fields = [
        'invoice_number','amount','hst','currency','gc_name','site_address',
        'issuer_email','issuer_name','company_name','company_hst_number',
        'hours_logged','issued_at','timekeeper_version',
      ];
      const extracted = {};
      for (const f of fields) extracted[f] = extractField(f);
      const base = parseFloat(extracted.amount) || 0;
      const hst = parseFloat(extracted.hst) || 0;
      const hasCompany = extracted.company_name.length > 0;
      return {
        ok: true,
        extracted,
        normalized: {
          source: hasCompany ? 'xmp' : 'manual_required',
          amount_gross: Math.round((base + hst) * 100) / 100,
          amount_hst: hst,
        },
      };
    }

    async function downloadInvoicePdf() {
      try {
        const payload = buildInvoicePayload();
        const bytes = await generateInvoicePdf(payload);

        // Validate against the portal's regex contract
        const validation = validateXmpExtraction(bytes);
        console.group('[make] XMP validation');
        console.log('Payload sent to PDF:', payload);
        console.log('Validation result:', validation);
        if (validation.ok) {
          console.log('%c✓ Portal will extract source=' + validation.normalized.source,
            'color: ' + (validation.normalized.source === 'xmp' ? 'green' : 'orange'));
        } else {
          console.error('✗ Extraction failed:', validation.reason);
        }
        console.groupEnd();

        const blob = new Blob([bytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = payload.invoice_number + '.pdf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } catch (err) {
        console.error('[make] PDF generation failed', err);
        alert('Erro ao gerar PDF: ' + err.message);
      }
    }

    function render() {
      renderHeader();
      const main = $('main');
      let content = '';

      if (state.view === 'hub') content = renderHub();
      else if (state.view === 'sent') content = renderSent();
      else {
        switch (state.step) {
          case 1: content = renderStep1(); break;
          case 2: content = renderStep2(); break;
          case 3: content = renderStep3(); break;
          case 4: content = renderStep4(); break;
          case 5: content = renderStep5(); break;
        }
      }

      main.innerHTML = content;
      main.scrollTop = 0;
      renderModal();
    }

    $('backBtn').addEventListener('click', goBack);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (state.modal) closeModal();
        else if (state.view === 'flow') goBack();
      }
    });

    render();
  </script>
</body>
